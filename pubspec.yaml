name: portoflio
description: "Senior Flutter Developer Portfolio — showcasing advanced Flutter engineering."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Routing
  go_router: ^17.1.0

  # Data Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Networking
  http: ^1.3.0

  # Markdown rendering
  flutter_markdown: ^0.7.6+2

  # Fonts (Stitch project: Newsreader)
  google_fonts: ^6.2.1

  # URL launcher (contact links)
  url_launcher: ^6.3.1

  # Cinematic video background (optional)
  video_player: ^2.9.2

  # Animation & Interaction for Persian Prince theme
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  visibility_detector: any
  smooth_scroll_multiplatform: ^1.0.2
  rive: ^0.13.13
  model_viewer_plus: ^1.2.1
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: any
  freezed: any
  json_serializable: any
  riverpod_generator: any
  riverpod_lint: any

  # Golden tests
  alchemist: any

flutter:
  uses-material-design: true

  assets:
    - assets/data/resume.json
    - assets/images/avatar.jpeg
    - assets/video/
    - assets/rive/
    - assets/textures/
    - assets/images/desert_landscapes/
    - assets/images/persian_patterns/
    - assets/images/icons/
    - assets/audio/

  shaders:
    - assets/shaders/sine_wave.frag
    - assets/shaders/hero_bg.frag
    - assets/shaders/desert_dunes.frag
    - assets/shaders/persian_caravan.frag
    - assets/shaders/oasis_water.frag
    - assets/shaders/desert_sunset.frag
    - assets/shaders/starlight_desert.frag

