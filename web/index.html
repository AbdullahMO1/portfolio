<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Senior Flutter Developer Portfolio — showcasing advanced Flutter engineering, 3D animations, custom shaders, and enterprise architecture.">
  <meta name="theme-color" content="#1a1a2e">

  <!-- SEO -->
  <meta name="author" content="Abdullah Mohammed">
  <meta name="keywords" content="Flutter, Developer, Portfolio, Senior, Team Lead, Dart, WASM, WebAssembly">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Abdullah Mohammed — Senior Flutter Developer</title>
  <link rel="manifest" href="manifest.json">

  <!-- Fonts: preconnect + display=swap for non-blocking load -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* Loading screen while WASM initializes */
    body {
      margin: 0;
      background-color: #0a0a1a;
      overflow: hidden;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Inter', sans-serif;
      color: #8b8bff;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .loading::after {
      content: '';
      width: 20px;
      height: 20px;
      margin-left: 12px;
      border: 2px solid transparent;
      border-top-color: #8b8bff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">Initializing</div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
