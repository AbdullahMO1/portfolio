<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1B3D"/>
      <stop offset="100%" stop-color="#0A1128"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8960C"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="innerShadow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="2"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#000" flood-opacity="0.3"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer ornamental ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.7"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>

  <!-- Corner ornaments on the ring (diamond shapes at cardinal points) -->
  <g fill="url(#gold)" opacity="0.6">
    <polygon points="256,16 262,28 256,40 250,28"/>
    <polygon points="256,472 262,484 256,496 250,484"/>
    <polygon points="16,256 28,250 40,256 28,262"/>
    <polygon points="472,256 484,250 496,256 484,262"/>
  </g>

  <!-- Shield shape -->
  <path d="M256,68 L400,120 L400,260 Q400,380 256,448 Q112,380 112,260 L112,120 Z" 
        fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.9" filter="url(#glow)"/>
  <path d="M256,78 L392,127 L392,258 Q392,372 256,438 Q120,372 120,258 L120,127 Z" 
        fill="url(#bg)" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- Inner decorative line on shield -->
  <path d="M256,98 L376,140 L376,252 Q376,356 256,418 Q136,356 136,252 L136,140 Z" 
        fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>

  <!-- Crown above initials -->
  <g transform="translate(256,148)" filter="url(#glow)">
    <path d="M-50,10 L-40,-20 L-20,0 L0,-30 L20,0 L40,-20 L50,10 Z" 
          fill="url(#gold)" opacity="0.85"/>
    <circle cx="-40" cy="-22" r="5" fill="url(#gold)" opacity="0.9"/>
    <circle cx="0" cy="-32" r="6" fill="url(#gold)" opacity="0.9"/>
    <circle cx="40" cy="-22" r="5" fill="url(#gold)" opacity="0.9"/>
    <rect x="-50" y="10" width="100" height="6" rx="2" fill="url(#gold)" opacity="0.7"/>
  </g>

  <!-- Initials "AM" -->
  <text x="256" y="310" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" 
        font-size="140" font-weight="700" fill="url(#gold)" filter="url(#glow)" 
        letter-spacing="8">AM</text>

  <!-- Decorative flourish below initials -->
  <g transform="translate(256, 360)" opacity="0.6">
    <line x1="-80" y1="0" x2="-20" y2="0" stroke="url(#gold)" stroke-width="2"/>
    <line x1="20" y1="0" x2="80" y2="0" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="url(#gold)"/>
    <circle cx="-85" cy="0" r="3" fill="url(#gold)" opacity="0.5"/>
    <circle cx="85" cy="0" r="3" fill="url(#gold)" opacity="0.5"/>
  </g>

  <!-- Subtle radial glow in center -->
  <circle cx="256" cy="270" r="120" fill="url(#goldShine)" opacity="0.08"/>
</svg>
