<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/portoflio/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Viewport: Flutter Web injects its own at runtime for compatibility -->
  <meta name="description" content="Senior Flutter Developer Portfolio — showcasing advanced Flutter engineering, 3D animations, custom shaders, and enterprise architecture.">
  <meta name="theme-color" content="#0A1128">

  <!-- SEO -->
  <meta name="author" content="Abdullah Mohammed">
  <meta name="keywords" content="Flutter, Developer, Portfolio, Senior, Team Lead, Dart, WASM, WebAssembly">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Abdullah Mohammed — Senior Flutter Developer</title>
  <link rel="manifest" href="manifest.json">

  <!-- Fonts: Newsreader to match app theme -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

  <style>
    /* Loading screen — royal theme (Imperial Navy + Gold) */
    :root {
      --navy-base: #0A1128;
      --navy-surface: #0F1B3D;
      --gold: #D4AF37;
      --gold-light: #FFD700;
      --slate: #8E9AAF;
    }
    body {
      margin: 0;
      background-color: var(--navy-base);
      overflow: hidden;
      min-height: 100vh;
    }
    .loading-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }
    .loading-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .loading-brand {
      font-family: 'Newsreader', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      position: relative;
    }
    .loading-dots {
      display: inline-flex;
      gap: 0.35rem;
      align-items: center;
    }
    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1); }
    }
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(212, 175, 55, 0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-top: 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-label {
      font-family: 'Newsreader', serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--slate);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="loading-wrap" id="loading">
    <div class="loading-brand">Abdullah Mohammed</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <div class="loading-spinner"></div>
    <div class="loading-label">Initializing</div>
  </div>
  <script src="audio.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
